name: Release Agent

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    name: Windows (x86_64 GNU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust kur + Windows GNU target ekle
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: MinGW linker kur
        run: sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-gnu
        working-directory: agent

      - name: Release'e yukle
        uses: softprops/action-gh-release@v2
        with:
          files: agent/target/x86_64-pc-windows-gnu/release/agent.exe
          name: orkestra-agent-windows.exe

  build-macos:
    name: macOS (ARM64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust kur
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build
        run: cargo build --release --target aarch64-apple-darwin
        working-directory: agent

      - name: Release'e yukle
        uses: softprops/action-gh-release@v2
        with:
          files: agent/target/aarch64-apple-darwin/release/agent
          name: orkestra-agent-macos-arm64

  build-linux:
    name: Linux ARM64 (Raspi)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust kur + ARM64 target ekle
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: ARM64 linker kur
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target aarch64-unknown-linux-gnu
        working-directory: agent
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Release'e yukle
        uses: softprops/action-gh-release@v2
        with:
          files: agent/target/aarch64-unknown-linux-gnu/release/agent
          name: orkestra-agent-linux-arm64
