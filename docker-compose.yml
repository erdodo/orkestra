version: "3.9"

services:
  orkestra:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3081:3081"
    volumes:
      - orkestra_db:/app/dev.db
    environment:
      - NODE_ENV=production
      - PORT=3081
      - DATABASE_URL=file:/app/dev.db
    restart: unless-stopped

  gost:
    image: gogost/gost:3
    network_mode: host
    command: "-L socks5://:1080"
    restart: unless-stopped

volumes:
  orkestra_db:
